<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件管理 | GOOD VIBES AGENCY</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#F5F5F5;--white:#FFF;--accent:#1A1A1A;--border:#E0E0E0;--mid:#555;--light:#999;--section-bg:#FAFAFA;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:"Noto Sans JP",sans-serif;font-size:14px;color:var(--accent);line-height:1.7;}

    /* ── PIN ── */
    #pin-screen{position:fixed;inset:0;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px;z-index:9999;}
    #pin-screen.hidden{display:none;}
    .pin-logo{color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;}
    .pin-title{color:#fff;font-size:20px;font-weight:700;}
    .pin-boxes{display:flex;gap:12px;}
    .pin-box{width:52px;height:60px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;font-size:28px;font-weight:700;color:#fff;text-align:center;cursor:pointer;caret-color:transparent;}
    .pin-box:focus{outline:none;border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.12);}
    .pin-error{color:#FF6B6B;font-size:12px;height:18px;text-align:center;}

    /* ── App ── */
    #app{display:none;}
    #app.visible{display:block;}
    .app-header{background:var(--accent);padding:0;}
    .app-header-inner{max-width:860px;margin:0 auto;padding:18px 20px;display:flex;align-items:center;gap:12px;}
    .app-logo{color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;}
    .app-title{color:#fff;font-size:16px;font-weight:700;flex:1;}
    .header-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
    .header-btn:hover{background:rgba(255,255,255,0.18);}
    .header-btn.primary{background:#fff;color:var(--accent);border-color:#fff;}
    .header-btn.primary:hover{opacity:0.9;}
    .logout-btn{background:none;border:none;color:rgba(255,255,255,0.3);font-size:12px;cursor:pointer;font-family:inherit;padding:6px 8px;}
    .logout-btn:hover{color:rgba(255,255,255,0.6);}

    /* ── 設定パネル ── */
    .settings-bar{background:var(--white);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height 0.25s ease;}
    .settings-bar.open{max-height:120px;}
    .settings-inner{max-width:860px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px;}
    .settings-inner label{font-size:12px;font-weight:700;color:var(--mid);white-space:nowrap;}
    .settings-inner input{flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;font-family:monospace;background:var(--section-bg);}
    .settings-inner input:focus{outline:none;border-color:var(--accent);}
    .settings-save{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}

    /* ── 案件一覧 ── */
    .main{max-width:860px;margin:0 auto;padding:28px 20px 80px;}
    .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .list-header h2{font-size:15px;font-weight:700;color:var(--mid);}
    .brief-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
    .brief-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;transition:box-shadow 0.15s;}
    .brief-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}
    .brief-meta{font-size:11px;color:var(--light);letter-spacing:0.02em;}
    .brief-title{font-size:14px;font-weight:700;color:var(--accent);line-height:1.5;}
    .brief-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .brief-link{display:inline-flex;align-items:center;gap:4px;background:var(--section-bg);border:1px solid var(--border);color:var(--accent);font-size:11px;font-weight:600;padding:5px 12px;border-radius:5px;text-decoration:none;transition:all 0.15s;}
    .brief-link:hover{background:var(--border);}
    .brief-link.delivery{color:var(--mid);}
    .empty-state{text-align:center;padding:60px 20px;color:var(--light);font-size:14px;grid-column:1/-1;}

    /* ── モーダル ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;overflow-y:auto;padding:20px;}
    .modal-overlay.open{display:block;}
    .modal{background:var(--white);border-radius:12px;max-width:760px;margin:0 auto;overflow:hidden;}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1;}
    .modal-head h2{font-size:16px;font-weight:700;}
    .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--light);line-height:1;padding:4px 8px;}
    .modal-body{padding:28px 24px;}
    .m-section{font-size:11px;font-weight:700;color:var(--light);letter-spacing:0.08em;text-transform:uppercase;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
    .m-section:first-child{margin-top:0;}
    .mf{margin-bottom:14px;}
    .mf label{display:block;font-size:12px;font-weight:700;color:var(--mid);margin-bottom:5px;}
    .mf label .req{color:#E53935;margin-left:3px;}
    .mf label .opt{color:var(--light);font-weight:400;font-size:11px;margin-left:4px;}
    .mf input,.mf textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:13px;font-family:"Noto Sans JP",sans-serif;background:var(--white);resize:vertical;transition:border-color 0.15s;}
    .mf input:focus,.mf textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(26,26,26,0.07);}
    .mf textarea{min-height:76px;}
    .mf textarea.t{min-height:110px;}
    .mf .hint{font-size:11px;color:var(--light);margin-top:4px;}
    .m-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .faq-block{background:var(--section-bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
    .faq-block-num{font-size:11px;font-weight:700;color:var(--light);margin-bottom:10px;letter-spacing:0.08em;text-transform:uppercase;}
    .modal-footer{display:flex;gap:10px;padding:20px 24px;border-top:1px solid var(--border);background:var(--white);position:sticky;bottom:0;z-index:1;}
    .preview-btn{flex:1;background:var(--white);color:var(--accent);border:1px solid var(--border);border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
    .preview-btn:hover{background:var(--section-bg);border-color:var(--accent);}
    .submit-btn{flex:2;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
    .submit-btn:hover{opacity:0.85;}
    .submit-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .modal-spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;display:none;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .result-box{background:var(--section-bg);border-radius:8px;padding:20px;margin-top:16px;text-align:center;}
    .result-box h3{font-size:16px;font-weight:700;margin-bottom:12px;color:#2E7D32;}
    .result-box .url-row{text-align:left;margin-bottom:8px;}
    .result-box .url-label{font-size:11px;font-weight:700;color:var(--light);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;}
    .result-box .url-val{background:var(--white);border:1px solid var(--border);border-radius:5px;padding:8px 12px;font-size:12px;word-break:break-all;}
    .result-box .url-val a{color:var(--accent);font-weight:600;}
    .error-box{background:#FFF3F3;border:1px solid #FFCDD2;border-radius:8px;padding:16px;color:#C62828;font-size:13px;margin-top:12px;}

    /* ── プレビューモーダル ── */
    .preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:600;padding:20px;}
    .preview-overlay.open{display:block;}
    .preview-modal{background:var(--white);border-radius:10px;max-width:800px;margin:0 auto;overflow:hidden;height:calc(100vh - 40px);display:flex;flex-direction:column;}
    .preview-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .preview-modal-head h3{font-size:13px;font-weight:700;color:var(--mid);}
    .preview-frame{flex:1;border:none;width:100%;}

    @media(max-width:600px){.m-2col{grid-template-columns:1fr;}.brief-grid{grid-template-columns:1fr;}.modal-body{padding:20px 16px;}.app-header-inner{flex-wrap:wrap;gap:8px;}}
  </style>
</head>
<body>

<!-- ── PIN 画面 ── -->
<div id="pin-screen">
  <div class="pin-logo">GOOD VIBES AGENCY</div>
  <div class="pin-title">PINを入力</div>
  <div class="pin-boxes">
    <input class="pin-box" id="p0" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="pin-box" id="p1" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="pin-box" id="p2" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="pin-box" id="p3" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- ── アプリ本体 ── -->
<div id="app">
  <div class="app-header">
    <div class="app-header-inner">
      <div>
        <div class="app-logo">GOOD VIBES AGENCY</div>
        <div class="app-title">案件管理</div>
      </div>
      <button class="header-btn" id="settings-toggle">⚙️ 設定</button>
      <button class="header-btn primary" id="new-btn">＋ 新規作成</button>
      <button class="logout-btn" id="logout-btn">ログアウト</button>
    </div>
  </div>

  <div class="settings-bar" id="settings-bar">
    <div class="settings-inner">
      <label>GAS Web App URL</label>
      <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/...">
      <button class="settings-save" id="settings-save">保存</button>
    </div>
  </div>

  <div class="main">
    <div class="list-header">
      <h2>案件一覧</h2>
    </div>
    <div class="brief-grid" id="brief-grid">
      <!-- BRIEFS_LIST -->
      <div class="empty-state">まだ案件がありません。<br>「＋ 新規作成」から最初の案件を作成してください。</div>
    </div>
  </div>
</div>

<!-- ── 新規作成モーダル ── -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <div class="modal-head">
      <h2>新規依頼ページ作成</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div id="create-result"></div>
      <form id="create-form">

        <div class="m-section">基本情報</div>
        <div class="mf"><label>ページタイトル <span class="req">*</span></label><input type="text" name="ページタイトル" required placeholder="例: ブランドA【商品カテゴリ】タイアップのご依頼（〇月度）"></div>
        <div class="m-2col">
          <div class="mf"><label>月度ラベル <span class="opt">任意</span></label><input type="text" name="月度ラベル" placeholder="例: 2026年6月度"></div>
          <div class="mf"><label>ブランド名 <span class="req">*</span></label><input type="text" name="ブランド名" required placeholder="URLスラグに使用（英数字推奨）"></div>
        </div>
        <div class="mf"><label>商品公式サイトURL <span class="req">*</span></label><input type="url" name="商品公式サイトURL" required placeholder="https://..."></div>

        <div class="m-section">案件概要</div>
        <div class="mf"><label>お願いしたいこと（説明） <span class="req">*</span></label><textarea name="お願いしたいこと（説明）" class="t" required placeholder="商品をお試しいただき、Instagramへの投稿をお願いいたします🙇‍♀️"></textarea></div>
        <div class="mf"><label>投稿期間（テキスト） <span class="req">*</span></label><textarea name="投稿期間（テキスト）" required placeholder="例: Instagram：6月1日（月）〜6月30日（火）"></textarea></div>
        <div class="m-2col">
          <div class="mf"><label>応募締切 <span class="req">*</span></label><input type="text" name="応募締切" required placeholder="例: 6月25日（木）17時まで"></div>
          <div class="mf"><label>報酬（商品名・金額） <span class="req">*</span></label><input type="text" name="報酬（商品名・金額）" required placeholder="例: 商品無償提供（¥〇,〇〇〇相当）"></div>
        </div>
        <div class="mf"><label>投稿媒体 <span class="req">*</span></label><textarea name="投稿媒体" required placeholder="例: Instagram：フィード・リール&#10;X：1ポスト"></textarea></div>
        <div class="mf"><label>投稿内容 <span class="req">*</span></label><textarea name="投稿内容" required placeholder="例: 商品の使用感・日常ケアシーン"></textarea></div>

        <div class="m-section">商品情報</div>
        <div class="mf"><label>商品説明テキスト <span class="req">*</span></label><textarea name="商品説明テキスト" class="t" required placeholder="商品の特徴・効果・成分などの説明文"></textarea></div>
        <div class="mf"><label>こんな人にオススメ（改行区切り） <span class="opt">任意</span></label><textarea name="こんな人にオススメ（改行区切り）" placeholder="1行に1項目&#10;例: ○○が気になっている方"></textarea></div>
        <div class="mf"><label>商品名（表記） <span class="req">*</span></label><textarea name="商品名（表記）" required placeholder="例: 商品の正式名称&#10;→略称・通称でもOK"></textarea></div>
        <div class="m-2col">
          <div class="mf"><label>容量・内容量 <span class="opt">任意</span></label><input type="text" name="容量・内容量" placeholder="例: ○○g / ○○mL"></div>
          <div class="mf"><label>販売価格 <span class="opt">任意</span></label><input type="text" name="販売価格" placeholder="例: ○,○○○円（税込）"></div>
        </div>
        <div class="mf"><label>販売先 <span class="opt">任意</span></label><textarea name="販売先" placeholder="例: 公式サイト・楽天・Amazon・Yahoo!"></textarea></div>

        <div class="m-section">よくある質問（最大5件）</div>
        <div class="faq-block"><div class="faq-block-num">FAQ 1</div><div class="mf"><input type="text" name="FAQ質問1" placeholder="Q: 質問"></div><div class="mf" style="margin-bottom:0"><textarea name="FAQ回答1" placeholder="A: 回答"></textarea></div></div>
        <div class="faq-block"><div class="faq-block-num">FAQ 2</div><div class="mf"><input type="text" name="FAQ質問2" placeholder="Q: 質問"></div><div class="mf" style="margin-bottom:0"><textarea name="FAQ回答2" placeholder="A: 回答"></textarea></div></div>
        <div class="faq-block"><div class="faq-block-num">FAQ 3</div><div class="mf"><input type="text" name="FAQ質問3" placeholder="Q: 質問"></div><div class="mf" style="margin-bottom:0"><textarea name="FAQ回答3" placeholder="A: 回答"></textarea></div></div>
        <div class="faq-block"><div class="faq-block-num">FAQ 4</div><div class="mf"><input type="text" name="FAQ質問4" placeholder="Q: 質問"></div><div class="mf" style="margin-bottom:0"><textarea name="FAQ回答4" placeholder="A: 回答"></textarea></div></div>
        <div class="faq-block"><div class="faq-block-num">FAQ 5</div><div class="mf"><input type="text" name="FAQ質問5" placeholder="Q: 質問"></div><div class="mf" style="margin-bottom:0"><textarea name="FAQ回答5" placeholder="A: 回答"></textarea></div></div>

        <div class="m-section">NG事項 &amp; 必須表現</div>
        <div class="mf"><label>NG事項（改行区切り） <span class="req">*</span></label><textarea name="NG事項（改行区切り）" class="t" required placeholder="1行に1項目&#10;比較表現&#10;完璧表現など"></textarea></div>
        <div class="mf"><label>必須キャプション <span class="req">*</span></label><textarea name="必須キャプション" required placeholder="例: ◯◯様よりご提供いただきました"></textarea></div>
        <div class="mf"><label>必須ハッシュタグ（スペース区切り） <span class="req">*</span></label><input type="text" name="必須ハッシュタグ（スペース区切り）" required placeholder="例: #ブランド名 #商品カテゴリ #gifted"></div>
        <div class="m-2col">
          <div class="mf"><label>Instagramアカウントタグ <span class="opt">任意</span></label><input type="text" name="Instagramアカウントタグ" placeholder="例: @brand_account"></div>
          <div class="mf"><label>TikTokアカウントタグ <span class="opt">任意</span></label><input type="text" name="TikTokアカウントタグ" placeholder="例: @brand_tiktok"></div>
        </div>
        <div class="m-2col">
          <div class="mf"><label>Xアカウントタグ <span class="opt">任意</span></label><input type="text" name="Xアカウントタグ" placeholder="例: @brand_x"></div>
          <div class="mf"><label>X投稿用リンク <span class="opt">任意</span></label><input type="text" name="X投稿用リンク（任意）" placeholder="https://..."></div>
        </div>

        <div class="m-section">参考例・フロー</div>
        <div class="mf"><label>過去の投稿例（改行区切り） <span class="opt">任意</span></label><div class="hint">形式: プラットフォーム|説明|URL</div><textarea name="過去の投稿例（改行区切り）" class="t" placeholder="Instagram|説明|https://..."></textarea></div>
        <div class="mf"><label>お問い合わせ先（改行区切り） <span class="req">*</span></label><div class="hint">形式: プラットフォーム|URL</div><textarea name="お問い合わせ先（改行区切り）" required placeholder="Instagram|https://www.instagram.com/gva_casting/"></textarea></div>

      </form>
    </div>
    <div class="modal-footer">
      <button class="preview-btn" id="preview-btn">👁 プレビュー</button>
      <button class="submit-btn" id="submit-btn">
        <span id="submit-text">🚀 生成・公開する</span>
        <div class="modal-spinner" id="submit-spinner"></div>
      </button>
    </div>
  </div>
</div>

<!-- ── プレビューモーダル ── -->
<div class="preview-overlay" id="preview-overlay">
  <div class="preview-modal">
    <div class="preview-modal-head">
      <h3>📄 プレビュー（確認用）</h3>
      <button class="modal-close" id="preview-close">✕</button>
    </div>
    <iframe class="preview-frame" id="preview-frame"></iframe>
  </div>
</div>

<script>
const PAGES_BASE = 'https://goodvibesagency.tokyo/gva-briefs';
const PIN_CORRECT = '0331';
const LS_PIN = 'gva_pin_ok';
const LS_GAS = 'gva_gas_endpoint';


// === スラグ生成 ===
function generateSlug(brand) {
  const now  = new Date();
  const date = now.getFullYear()
             + String(now.getMonth()+1).padStart(2,'0')
             + String(now.getDate()).padStart(2,'0');
  const rand = Math.random().toString(36).slice(2,5);
  return (brand + '-' + date + '-' + rand)
    .toLowerCase()
    .replace(/[^a-z0-9\-]/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '') || 'brief-' + Date.now();
}


// === ヘルパー ===
function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escNl(str) { return esc(str).replace(/\n/g, '<br>'); }

function generateSlug(brand) {
  const now  = new Date();
  const date = now.getFullYear()
             + String(now.getMonth()+1).padStart(2,'0')
             + String(now.getDate()).padStart(2,'0');
  const rand = Math.random().toString(36).slice(2,5);
  return (brand + '-' + date + '-' + rand)
    .toLowerCase()
    .replace(/[^a-z0-9\-]/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '') || 'brief-' + Date.now();
}

function buildRecommendHtml(raw) {
  if (!raw.trim()) return '';
  const items = raw.split('\n').filter(s => s.trim());
  const liHtml = items.map(item => '<li>' + esc(item.replace(/^[・✔️\-\*]+\s*/, '')) + '</li>').join('\n');
  return `<div class="recommend-list"><div class="label">こんな人にオススメ！</div><ul>${liHtml}</ul></div>`;
}

function buildFaqHtml(r) {
  const faqs = [];
  for (let i = 1; i <= 5; i++) {
    const q = r['FAQ質問' + i] || '';
    const a = r['FAQ回答' + i] || '';
    if (q && a) faqs.push({q, a});
  }
  if (!faqs.length) return '';
  const itemsHtml = faqs.map(f =>
    `<div class="faq-item"><div class="faq-q">${esc(f.q)}</div><div class="faq-a">${escNl(f.a)}</div></div>`
  ).join('\n');
  return `<div class="section"><div class="section-title"><div class="icon">❓</div>よくある質問</div><div class="faq-list">${itemsHtml}</div></div>`;
}

function buildNgHtml(raw) {
  if (!raw.trim()) return '<li>（なし）</li>';
  return raw.split('\n').filter(s => s.trim())
    .map(item => '<li>' + esc(item.replace(/^[・🚫\-\*]+\s*/, '')) + '</li>').join('\n');
}

function buildHashtagsHtml(raw) {
  if (!raw.trim()) return '';
  return raw.split(/[\s\n]+/).filter(s => s.trim())
    .map(tag => { const t = tag.startsWith('#') ? tag : '#' + tag; return `<span class="hashtag">${esc(t)}</span>`; }).join(' ');
}

function buildAccountTagsHtml(r) {
  const platforms = [
    {key:'Instagramアカウントタグ', label:'Instagram'},
    {key:'TikTokアカウントタグ',    label:'TikTok'},
    {key:'Xアカウントタグ',         label:'X'}
  ];
  const result = platforms.filter(p => r[p.key])
    .map(p => `<div><small style="color:var(--light);font-size:11px">${p.label}：</small><strong>${esc(r[p.key])}</strong></div>`).join('\n');
  return result || '（未設定）';
}

function buildXLinkHtml(link) {
  if (!link) return '';
  return `<div class="section"><div class="section-title"><div class="icon">🔗</div>投稿設置リンク（Xの方のみ）</div><p style="font-size:13px;color:var(--mid);margin-bottom:12px">ツリー形式（リプ欄）にリンクを貼ってください🙇‍♀️</p><div class="link-block"><a href="${esc(link)}" target="_blank">${esc(link)}</a><button class="copy-hint" onclick="navigator.clipboard.writeText('${esc(link)}');this.textContent='✓ コピー済'">📋 コピー</button></div></div>`;
}

function buildPostExamplesHtml(raw) {
  if (!raw.trim()) return '';
  const items = raw.split('\n').filter(s => s.trim());
  if (!items.length) return '';
  const exHtml = items.map(line => {
    const parts = line.split('|');
    const platform = parts[0] ? parts[0].trim() : '';
    const desc     = parts[1] ? parts[1].trim() : '';
    const url      = parts[2] ? parts[2].trim() : '';
    return `<div class="post-example"><div class="platform-badge">${esc(platform)}</div><p class="desc">${esc(desc)}</p>${url ? `<a href="${esc(url)}" target="_blank">👉 投稿を見る</a>` : ''}</div>`;
  }).join('\n');
  return `<div class="section"><div class="section-title"><div class="icon">✨</div>過去の投稿例</div><p style="font-size:13px;color:var(--mid);margin-bottom:14px">投稿スタイルは自由です。あくまで参考例としてご覧ください！</p>${exHtml}</div>`;
}

function buildContactHtml(raw) {
  if (!raw.trim()) return '';
  const platformIcons = {Instagram:'📸', X:'🐦', TikTok:'🎵', LINE:'💬'};
  return raw.split('\n').filter(s => s.trim()).map(line => {
    const parts    = line.split('|');
    const platform = parts[0] ? parts[0].trim() : '';
    const url      = parts[1] ? parts[1].trim() : '';
    const icon     = platformIcons[platform] || '📨';
    const href     = url.startsWith('http') ? url : '#';
    return `<a class="contact-item" href="${esc(href)}" target="_blank"><span style="font-size:22px">${icon}</span><div><div class="platform">${esc(platform)}</div><div class="handle">${esc(url)}</div></div></a>`;
  }).join('\n');
}

  html = html.replace(/{{ACCOUNT_TAGS_HTML}}/g,        buildAccountTagsHtml(r));
  html = html.replace(/{{X_LINK_HTML}}/g,              buildXLinkHtml(r['X投稿用リンク（任意）'] || ''));
  html = html.replace(/{{POST_EXAMPLES_HTML}}/g,       buildPostExamplesHtml(r['過去の投稿例（改行区切り）'] || ''));
  html = html.replace(/{{DELIVERY_FORM_URL}}/g,        './delivery.html');
  html = html.replace(/{{CONTACT_HTML}}/g,             buildContactHtml(r['お問い合わせ先（改行区切り）'] || ''));
  return html;
}

<script>
const EP='${ep.replace(/'/g,"\'")}';

async function lz(){const z=document.getElementById('zip').value.replace(/[^0-9]/g,'');if(z.length!==7){alert('郵便番号を7桁で入力してください');return;}try{const r=await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+z);const d=await r.json();if(d.results){const x=d.results[0];const p=document.getElementById('pref');for(let i=0;i<p.options.length;i++){if(p.options[i].text===x.address1){p.selectedIndex=i;break;}}document.getElementById('a1').value=x.address2+x.address3;}else{alert('住所が見つかりませんでした。');}}catch(e){alert('住所の取得に失敗しました。');}}

// ── PIN ──
function initPin() {
  if (localStorage.getItem(LS_PIN) === '1') { showApp(); return; }
  document.getElementById('pin-screen').classList.remove('hidden');
  document.getElementById('p0').focus();
}
function showApp() {
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  const saved = localStorage.getItem(LS_GAS);
  if (saved) document.getElementById('gas-url-input').value = saved;
}
document.querySelectorAll('.pin-box').forEach((box, i) => {
  box.addEventListener('input', e => {
    const v = e.target.value.replace(/[^0-9]/g,'');
    e.target.value = v;
    if (v && i < 3) document.getElementById('p'+(i+1)).focus();
    if (i === 3 && v) checkPin();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !e.target.value && i > 0) document.getElementById('p'+(i-1)).focus();
  });
});
function checkPin() {
  const pin = [0,1,2,3].map(i => document.getElementById('p'+i).value).join('');
  if (pin === PIN_CORRECT) {
    localStorage.setItem(LS_PIN, '1');
    showApp();
  } else {
    document.getElementById('pin-error').textContent = 'PINが正しくありません';
    [0,1,2,3].forEach(i => { document.getElementById('p'+i).value = ''; });
    document.getElementById('p0').focus();
    setTimeout(() => { document.getElementById('pin-error').textContent = ''; }, 2000);
  }
}
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem(LS_PIN);
  location.reload();
});

// ── 設定 ──
document.getElementById('settings-toggle').addEventListener('click', () => {
  document.getElementById('settings-bar').classList.toggle('open');
});
document.getElementById('settings-save').addEventListener('click', () => {
  const v = document.getElementById('gas-url-input').value.trim();
  if (v) { localStorage.setItem(LS_GAS, v); alert('保存しました'); }
});

// ── モーダル開閉 ──
function openModal() {
  document.getElementById('new-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('create-result').innerHTML = '';
  document.getElementById('create-form').style.display = 'block';
}
function closeModal() {
  document.getElementById('new-modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('new-btn').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('new-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── プレビュー ──
document.getElementById('preview-btn').addEventListener('click', () => {
  const fd = new FormData(document.getElementById('create-form'));
  const r = {}; fd.forEach((v,k) => r[k] = v);
  const html = buildBriefHtml(r);
  document.getElementById('preview-frame').srcdoc = html;
  document.getElementById('preview-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
});
document.getElementById('preview-close').addEventListener('click', () => {
  document.getElementById('preview-overlay').classList.remove('open');
  document.body.style.overflow = '';
});

// ── 新規作成送信 ──
document.getElementById('submit-btn').addEventListener('click', async () => {
  const gasEp = localStorage.getItem(LS_GAS);
  if (!gasEp) { alert('設定画面でGAS Web App URLを設定してください'); document.getElementById('settings-bar').classList.add('open'); return; }
  const form = document.getElementById('create-form');
  if (!form.reportValidity()) return;

  const fd = new FormData(form);
  const r = {}; fd.forEach((v,k) => r[k] = v);
  const slug        = generateSlug(r['ブランド名']);
  const pageUrl     = PAGES_BASE + '/briefs/' + slug + '/';
  const deliveryUrl = pageUrl + 'delivery.html';

  const btn     = document.getElementById('submit-btn');
  const btnText = document.getElementById('submit-text');
  const spinner = document.getElementById('submit-spinner');
  btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'block';

  try {
    const params = new URLSearchParams(r);
    params.append('slug', slug);
    await fetch(gasEp, { method:'POST', mode:'no-cors', body: params });

    btnText.style.display = 'block'; spinner.style.display = 'none';
    form.style.display = 'none';
    document.getElementById('create-result').innerHTML = `
      <div class="result-box">
        <h3>🎉 送信完了！</h3>
        <p style="font-size:13px;color:#555;margin-bottom:16px">GASがページを生成中です。2〜3分後に下記URLで確認できます。</p>
        <div class="url-row"><div class="url-label">📋 タレント向け依頼ページ</div><div class="url-val"><a href="${pageUrl}" target="_blank">${pageUrl}</a></div></div>
        <div class="url-row" style="margin-top:8px"><div class="url-label">📦 配送フォーム</div><div class="url-val"><a href="${deliveryUrl}" target="_blank">${deliveryUrl}</a></div></div>
        <button onclick="location.reload()" style="margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">← 一覧に戻る（再読み込み）</button>
      </div>`;
  } catch(err) {
    btnText.style.display = 'block'; spinner.style.display = 'none';
    document.getElementById('create-result').innerHTML = `<div class="error-box">❌ エラーが発生しました: ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
});


// GAS URL を初期設定（未設定の場合のみ）
if (!localStorage.getItem(LS_GAS)) {
  localStorage.setItem(LS_GAS, 'https://script.google.com/macros/s/AKfycby8tsoJxFMuTPtlb4EOh7Vv___KhVMSHmzcEFKPg5xKktwRp6T7vPYYARtMYAAGEEZi/exec');
}
// ── 起動 ──
initPin();
</script>
</body>
</html>
