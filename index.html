<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GVA タイアップ依頼ページ一覧</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#FDFAF6;font-family:"Noto Sans JP",sans-serif;padding:40px 16px;min-height:100vh;}
    .header{max-width:720px;margin:0 auto 32px;}
    .header h1{font-size:22px;font-weight:700;color:#2D2D2D;margin-bottom:6px;}
    .header p{font-size:13px;color:#9E9896;}
    .grid{max-width:720px;margin:0 auto;display:grid;gap:12px;}
    .brief-card{background:white;border:1px solid #E8DDD8;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px;}
    .brief-meta{font-size:11px;color:#9E9896;letter-spacing:0.05em;}
    .brief-title{font-size:15px;font-weight:700;color:#2D2D2D;}
    .brief-link{display:inline-flex;align-items:center;gap:5px;background:#F2E8E1;color:#B85C52;font-size:12px;font-weight:600;padding:6px 14px;border-radius:7px;text-decoration:none;width:fit-content;transition:all 0.2s;}
    .brief-link:hover{background:#e0cec8;}
    .empty{text-align:center;padding:60px 20px;color:#9E9896;font-size:14px;}
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 タイアップ依頼ページ一覧</h1>
    <p>GOOD VIBES AGENCY — 自動生成されたタイアップ依頼ページ</p>
  </div>
  <div class="grid">
    <!-- BRIEFS_LIST -->
    <div class="empty">まだ依頼ページがありません。<br>フォームから案件を登録してください。</div>
  </div>
</body>
</html>
